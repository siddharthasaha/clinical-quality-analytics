name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: assessment/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: assessment/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
